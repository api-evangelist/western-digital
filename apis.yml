description: >-
  Western Digital is a global leader in data infrastructure, providing storage
  solutions including hard disk drives, solid state drives, flash memory, and
  data center systems. Their developer program exposes the WD My Cloud Home
  REST API enabling third-party applications to manage files, folders,
  thumbnails, shares, and user accounts stored on WD My Cloud Home devices.
apis:
  - aid: western-digital:my-cloud-home
    name: WD My Cloud Home API
    description: >-
      The WD My Cloud Home REST API enables off-device applications to manage
      files and folders on a user's My Cloud Home NAS device. It supports file
      upload, download, listing, search, sharing, thumbnails, and device
      discovery via OAuth 2.0 authentication. Applications call a configuration
      endpoint to obtain service URLs dynamically.
    humanURL: https://developer.westerndigital.com/develop/wd-my-cloud-home/
    baseURL: https://device.mycloud.com
    tags:
      - Cloud Storage
      - File Management
      - NAS
      - Consumer
    properties:
      - type: Documentation
        url: https://developer.westerndigital.com/develop/wd-my-cloud-home/
      - type: Portal
        url: https://developer.westerndigital.com/develop/wd/api.html
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/western-digital/refs/heads/main/openapi/western-digital-my-cloud-home-openapi.yml
      - type: SDK
