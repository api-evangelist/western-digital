naftiko: "1.0.0-alpha1"

info:
  label: "WD My Cloud Home"
  description: >-
    WD My Cloud Home REST API for managing files, folders, shares, and device
    configuration on Western Digital My Cloud Home NAS devices via OAuth 2.0.
  tags:
    - Cloud Storage
    - File Management
    - NAS
    - Consumer
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WD_MY_CLOUD_ACCESS_TOKEN: WD_MY_CLOUD_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: wd-my-cloud-home
      baseUri: https://device.mycloud.com
      description: WD My Cloud Home device API for file and folder management.
      authentication:
        type: bearer
        token: "{{WD_MY_CLOUD_ACCESS_TOKEN}}"
      resources:
        - name: configuration
          path: /config/v1/config
          description: Retrieve dynamic service endpoint URLs.
          operations:
            - name: get-service-configuration
              method: GET
              description: Get all service endpoint URLs for My Cloud Home.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: files
          path: /sdk/v2/files
          description: File and folder management on the NAS device.
          operations:
            - name: list-files
              method: GET
              description: List files and folders in a directory.
              inputParameters:
                - name: ids
                  in: query
                  type: string
                  required: false
                  description: Parent folder ID. Use "root" for root directory.
                - name: pageToken
                  in: query
                  type: string
                  required: false
                  description: Pagination token.
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum results to return (max 100).
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-file
              method: POST
              description: Upload a file or create a folder.
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  mimeType: "{{tools.mimeType}}"
                  parentId: "{{tools.parentId}}"

        - name: file
          path: /sdk/v2/files/{fileId}
          description: Single file operations.
          operations:
            - name: get-file
              method: GET
              description: Get metadata for a specific file or folder.
              inputParameters:
                - name: fileId
                  in: path
                  type: string
                  required: true
                  description: Unique file identifier.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-file
              method: PATCH
              description: Update file metadata (rename, move).
              inputParameters:
                - name: fileId
                  in: path
                  type: string
                  required: true
                  description: Unique file identifier.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  parentId: "{{tools.parentId}}"

            - name: delete-file
              method: DELETE
              description: Permanently delete a file or folder.
              inputParameters:
                - name: fileId
                  in: path
                  type: string
                  required: true
                  description: Unique file identifier.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: file-content
          path: /sdk/v2/files/{fileId}/content
          description: File content upload and download.
          operations:
            - name: download-file
              method: GET
              description: Download the content of a file.
              inputParameters:
                - name: fileId
                  in: path
                  type: string
                  required: true
                  description: Unique file identifier.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: files-search
          path: /sdk/v2/filesSearch/parents
          description: Search files by parent directory.
          operations:
            - name: search-files-by-parent
              method: GET
              description: Search for files within specified parent folders.
              inputParameters:
                - name: ids
                  in: query
                  type: string
                  required: true
                  description: Parent folder IDs to search (comma-separated).
                - name: pageToken
                  in: query
                  type: string
                  required: false
                  description: Pagination token.
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum results.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: shares
          path: /v1/shares
          description: Share management for files and folders.
          operations:
            - name: create-share
              method: POST
              description: Create a share link for files on the device.
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  ownerId: "{{tools.ownerId}}"
                  deviceId: "{{tools.deviceId}}"
                  fileIds: "{{tools.fileIds}}"

  exposes:
    - type: rest
      port: 8100
      namespace: wd-my-cloud-home-rest
      resources:
        - path: /v1/files
          name: files
          description: List and create files and folders.
          operations:
            - method: GET
              name: list-files
              description: List files in a directory.
              call: "wd-my-cloud-home.list-files"
              with:
                ids: "rest.ids"
                pageToken: "rest.pageToken"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-file
              description: Upload a file or create a folder.
              call: "wd-my-cloud-home.create-file"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/files/{fileId}
          name: file
          description: Get, update, or delete a specific file.
          operations:
            - method: GET
              name: get-file
              description: Get file metadata.
              call: "wd-my-cloud-home.get-file"
              with:
                fileId: "rest.fileId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-file
              description: Delete a file.
              call: "wd-my-cloud-home.delete-file"
              with:
                fileId: "rest.fileId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/files/{fileId}/content
          name: file-content
          description: Download file content.
          operations:
            - method: GET
              name: download-file
              description: Download file content.
              call: "wd-my-cloud-home.download-file"
              with:
                fileId: "rest.fileId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/shares
          name: shares
          description: Create file shares.
          operations:
            - method: POST
              name: create-share
              description: Create a share link.
              call: "wd-my-cloud-home.create-share"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: wd-my-cloud-home-mcp
      transport: http
      tools:
        - name: list-files
          description: List files and folders in a My Cloud Home directory.
          hints:
            readOnly: true
            openWorld: true
          call: "wd-my-cloud-home.list-files"
          with:
            ids: "tools.ids"
            pageToken: "tools.pageToken"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-file
          description: Upload a file or create a folder on My Cloud Home.
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "wd-my-cloud-home.create-file"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-file
          description: Get metadata for a specific file or folder.
          hints:
            readOnly: true
            openWorld: true
          call: "wd-my-cloud-home.get-file"
          with:
            fileId: "tools.fileId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: download-file
          description: Download the content of a file from My Cloud Home.
          hints:
            readOnly: true
            openWorld: true
          call: "wd-my-cloud-home.download-file"
          with:
            fileId: "tools.fileId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-file
          description: Permanently delete a file or folder from My Cloud Home.
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "wd-my-cloud-home.delete-file"
          with:
            fileId: "tools.fileId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: search-files-by-parent
          description: Search for files within specified parent folders.
          hints:
            readOnly: true
            openWorld: true
          call: "wd-my-cloud-home.search-files-by-parent"
          with:
            ids: "tools.ids"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-share
          description: Create a share link for files on the device.
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "wd-my-cloud-home.create-share"
          outputParameters:
            - type: object
              mapping: "$."
